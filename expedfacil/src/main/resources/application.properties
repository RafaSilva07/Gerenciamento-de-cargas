spring.application.name=expedfacil

# URL de conexao com o banco MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/cargadb

# Usuario do banco
spring.datasource.username=root

# Senha do usuario
spring.datasource.password=07082004

# Driver JDBC do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Atualiza/cria tabelas automaticamente conforme as entidades
spring.jpa.hibernate.ddl-auto=validate

# Mostra as queries SQL no console
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
security.jwt.secret=expedfacil_chave_jwt_muito_segura_2026_123456
security.jwt.expiration-ms=28800000
