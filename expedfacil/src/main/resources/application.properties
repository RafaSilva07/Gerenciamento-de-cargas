spring.application.name=expedfacil

# URL de conexao com o banco MySQL local
spring.datasource.url=jdbc:mysql://localhost:3307/cargadb

# Usuario do banco
spring.datasource.username=root

# Senha do usuario
spring.datasource.password=0708

# Driver JDBC do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate apenas valida o schema; evolucao fica nas migrations
spring.jpa.hibernate.ddl-auto=validate

# Mostra as queries SQL no console
spring.jpa.show-sql=true

# Flyway (versionamento de schema)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

